services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: mushroom-classifier:latest
    container_name: mushroom-classifier-api
    ports:
      - "8000:8000"
    environment:
      MODEL_PATH: /app/models/baseline_resnet18.pt
      MODEL_NAME: resnet18
      DEVICE: cpu
    volumes:
      - ./models:/app/models:ro
      - ./reports:/app/reports:ro
    command: uvicorn src.api.app:app --host 0.0.0.0 --port 8000

  tests:
    image: mushroom-classifier:latest
    build:
      context: .
      dockerfile: Dockerfile
    profiles:
      - tools
    command: python -m pytest tests -q

  preprocess:
    image: mushroom-classifier:latest
    build:
      context: .
      dockerfile: Dockerfile
    profiles:
      - tools
    volumes:
      - ./data:/app/data
    command: python src/data/prepare_dataset.py --overwrite

  train:
    image: mushroom-classifier:latest
    build:
      context: .
      dockerfile: Dockerfile
    profiles:
      - tools
    environment:
      DEVICE: gpu
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./reports:/app/reports
    command: python src/training/train_baseline.py
